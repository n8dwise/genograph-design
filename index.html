<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genograph</title>
</head>
<body>
    <div id="app">
        <header id="toolbar">
            <span class="app-title">Genograph</span>
            <input id="tree-title" type="text" placeholder="Family name…" autocomplete="off" />
            <div class="toolbar-actions">
                <button id="btn-new" title="New diagram">New</button>
                <button id="btn-load" title="Load JSON file">Load</button>
                <button id="btn-save" title="Save as JSON">Save</button>
                <button id="btn-export-png" title="Export diagram as PNG">Export PNG</button>
            </div>
            <input id="file-input" type="file" accept=".json" hidden />
        </header>

        <div id="main">
            <aside id="editor-panel">
                <section class="editor-section" id="people-section">
                    <div class="section-header">
                        <h3>People</h3>
                        <button id="btn-add-person" class="btn-add" title="Add person">+ Add</button>
                    </div>
                    <div id="people-list"></div>
                </section>

                <section class="editor-section" id="unions-section">
                    <div class="section-header">
                        <h3>Relationships</h3>
                        <button id="btn-add-union" class="btn-add" title="Add relationship">+ Add</button>
                    </div>
                    <div id="unions-list"></div>
                </section>

                <section class="editor-section" id="bonds-section">
                    <div class="section-header">
                        <h3>Connections</h3>
                        <button id="btn-add-bond" class="btn-add" title="Add connection">+ Add</button>
                    </div>
                    <div id="bonds-list"></div>
                </section>
            </aside>

            <div id="diagram-panel">
                <div id="paper-container"></div>
                <div id="diagram-empty">
                    <p>Add people and relationships<br>to see the diagram.</p>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
